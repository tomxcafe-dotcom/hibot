<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIP × TRADE</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Montserrat:wght@300;400;500;600&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── CSS ทั้งหมดคงเดิมจากไฟล์ต้นฉบับ ── */
:root {
  --dark:     #071A10;
  --forest:   #0B3D2E;
  --mid:      #145A32;
  --leaf:     #1A7A42;
  --mist:     #1C6B48;
  --gold:     #D4AF37;
  --gold-dim: #A88825;
  --gold-lt:  #F0D060;
  --cream:    #F5F5DC;
  --cream-dim:rgba(245,245,220,.65);
  --card-bg:  rgba(11,61,46,.55);
  --border:   rgba(212,175,55,.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Montserrat',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;overflow-x:hidden;}

/* HERO SECTION */
.hero{position:relative;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden;background:radial-gradient(circle at center,#0B3D2E 0%,#071A10 100%);padding:2rem;}
.hero-ring{position:absolute;border:1px solid rgba(212,175,55,0.1);border-radius:50%;animation:pulse 8s infinite;}
.hero-ring:nth-child(1){width:40vw;height:40vw;animation-delay:0s;}
.hero-ring:nth-child(2){width:60vw;height:60vw;animation-delay:2s;}
.hero-ring:nth-child(3){width:80vw;height:80vw;animation-delay:4s;}
@keyframes pulse{0%{transform:scale(1);opacity:0.3;}50%{transform:scale(1.1);opacity:0.1;}100%{transform:scale(1);opacity:0.3;}}

.hero-eyebrow{font-family:'Cinzel',serif;font-weight:600;color:var(--gold);letter-spacing:4px;text-transform:uppercase;margin-bottom:1rem;font-size:0.9rem;z-index:2;}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(3.5rem,10vw,7rem);font-weight:900;line-height:0.85;margin-bottom:1rem;color:var(--gold);text-shadow:0 10px 30px rgba(0,0,0,0.5);z-index:2;letter-spacing:-2px;}
.hero-title em{font-style:italic;color:var(--cream);font-weight:400;font-size:0.8em;display:block;margin-top:0.2rem;}
.hero-sub{font-family:'Cinzel',serif;color:var(--cream-dim);font-size:1.2rem;letter-spacing:6px;z-index:2;text-transform:uppercase;}
.hero-rule{width:60px;height:2px;background:var(--gold);margin:2rem 0;z-index:2;}
.hero-caption{font-family:'Sarabun',sans-serif;font-size:1.1rem;line-height:1.8;color:var(--cream-dim);z-index:2;font-weight:300;}

/* BUTTON */
.btn-cta{display:inline-block;margin-top:3rem;padding:1.2rem 2.5rem;background:transparent;border:1px solid var(--gold);color:var(--gold);text-decoration:none;font-family:'Cinzel',serif;letter-spacing:2px;font-weight:700;transition:all 0.4s ease;z-index:2;position:relative;overflow:hidden;}
.btn-cta:hover{background:var(--gold);color:var(--dark);transform:translateY(-3px);box-shadow:0 15px 30px rgba(0,0,0,0.3);}

/* TABS */
.tabs{position:sticky;top:0;display:flex;background:rgba(7,26,16,0.95);backdrop-filter:blur(20px);padding:0.5rem;z-index:100;border-bottom:1px solid var(--border);justify-content:center;gap:0.5rem;}
.tab-btn{background:transparent;border:none;color:var(--cream-dim);padding:1rem 1.5rem;font-family:'Cinzel',serif;font-weight:700;font-size:0.85rem;letter-spacing:1px;cursor:pointer;transition:all 0.3s;border-radius:2px;}
.tab-btn.active{color:var(--gold);border-bottom:2px solid var(--gold);}
.tab-btn:hover:not(.active){color:var(--cream);}

/* GRID */
.section{display:none;padding:5rem 1rem 8rem;max-width:1400px;margin:0 auto;}
.section.active{display:block;animation:fadeIn 0.8s ease forwards;}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.section-header{text-align:center;margin-bottom:4rem;}
.section-label{font-family:'Cinzel',serif;color:var(--gold);letter-spacing:3px;font-size:0.8rem;display:block;margin-bottom:0.5rem;}
.section-title{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;color:var(--cream);}

.menu-grid{display:grid;grid-template-columns:grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:2.5rem;padding:0 1rem;}
.menu-card{background:var(--card-bg);border:1px solid var(--border);padding:1rem;position:relative;transition:all 0.4s;border-radius:4px;}
.menu-card:hover{transform:translateY(-10px);border-color:var(--gold);}
.menu-img-wrap{position:relative;width:100%;aspect-ratio:1/1;overflow:hidden;margin-bottom:1.5rem;background:#000;border-radius:2px;}
.menu-img{width:100%;height:100%;object-fit:cover;transition:transform 0.8s cubic-bezier(0.2,1,0.3,1);opacity:0.85;}
.menu-card:hover .menu-img{transform:scale(1.1);opacity:1;}

.menu-info{text-align:center;}
.menu-name{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;color:var(--gold-lt);}
.menu-price{font-family:'Cinzel',serif;color:var(--gold);font-weight:700;font-size:1.1rem;border-top:1px solid var(--border);display:inline-block;padding-top:0.5rem;margin-top:0.5rem;}

/* COLLECT / ACHIEVEMENT */
.achieve-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:2rem;}
.ach-card{background:rgba(212,175,55,0.03);border:1px dashed var(--border);padding:2rem;text-align:center;transition:0.4s;filter:grayscale(100%);opacity:0.4;}
.ach-card.unlocked{filter:grayscale(0);opacity:1;border-style:solid;background:rgba(212,175,55,0.08);border-color:var(--gold);}
.ach-icon{font-size:2.5rem;margin-bottom:1rem;display:block;}
.ach-name{font-family:'Cinzel',serif;font-weight:700;color:var(--gold);font-size:0.9rem;}

/* ADMIN UI */
.admin-controls{background:rgba(20,90,50,0.3);border:1px solid var(--gold);padding:2rem;margin-bottom:3rem;border-radius:8px;}
.admin-form{display:grid;grid-template-columns:1fr 1fr auto;gap:1rem;margin-bottom:1rem;}
.admin-input, .admin-select{background:var(--dark);border:1px solid var(--forest);color:var(--cream);padding:0.8rem;font-family:'Sarabun';}
.btn-save{background:var(--gold);color:var(--dark);border:none;padding:0.8rem 1.5rem;font-family:'Cinzel';font-weight:900;cursor:pointer;}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(10px);}
.modal.open{display:flex;}
.modal-content{background:var(--forest);padding:3rem;border:1px solid var(--gold);max-width:400px;width:90%;text-align:center;position:relative;}
.modal-title{font-family:'Cinzel',serif;color:var(--gold);margin-bottom:2rem;font-size:1.5rem;}
.close-modal{position:absolute;top:1rem;right:1rem;color:var(--gold);background:none;border:none;font-size:1.5rem;cursor:pointer;}

/* SCROLL TOP */
#scrollTop{position:fixed;bottom:2rem;right:2rem;background:var(--gold);color:var(--dark);width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:50%;text-decoration:none;opacity:0;transition:0.3s;z-index:90;}
#scrollTop.visible{opacity:1;}

@media (max-width:768px){
  .hero-title{font-size:4rem;}
  .admin-form{grid-template-columns:1fr;}
  .section{padding-top:3rem;}
}
</style>
</head>
<body>

<section class="hero">
  <div class="hero-ring"></div><div class="hero-ring"></div><div class="hero-ring"></div>
  <p class="hero-eyebrow">กินไปเทรดไป &nbsp;·&nbsp; Sip &amp; Trade</p>
  <h1 class="hero-title">BARISTA<br><em>Trader</em></h1>
  <p class="hero-sub">× Trade Edition</p>
  <div class="hero-rule"></div>
  <p class="hero-caption">Sip First Trade Smart<br>ดื่มด่ำทุกรสชาติ แล้วเปิดกราฟต่อ</p>
  <a href="#" class="btn-cta" onclick="scrollToMenu();return false;">ดูเมนู ↓</a>
</section>

<nav class="tabs" id="mainNav">
  <button class="tab-btn active" onclick="switchTab('coffee',this)">☕ กาแฟ</button>
  <button class="tab-btn" onclick="switchTab('noncoffee',this)">🍵 ไม่ใช่กาแฟ</button>
  <button class="tab-btn" onclick="switchTab('collect',this)">🎖 ของสะสม</button>
  <button class="tab-btn admin-tab" onclick="switchTab('admin',this)">⚙ Admin</button>
</nav>

<div class="section active" id="tab-coffee">
  <div class="section-header">
    <span class="section-label">Coffee Series</span>
    <h2 class="section-title">กาแฟ</h2>
  </div>
  <div id="coffeeGrid" class="menu-grid"></div>
</div>

<div class="section" id="tab-noncoffee">
  <div class="section-header">
    <span class="section-label">Non-Coffee Series</span>
    <h2 class="section-title">ไม่ใช่กาแฟ</h2>
  </div>
  <div id="nonCoffeeGrid" class="menu-grid"></div>
</div>

<div class="section" id="tab-collect">
  <div class="section-header">
    <span class="section-label">Achievement</span>
    <h2 class="section-title">ของสะสม</h2>
  </div>
  <div id="collectGrid" class="achieve-grid"></div>
</div>

<div class="section" id="tab-admin">
  <div class="section-header">
    <h2 class="section-title">ระบบจัดการ</h2>
  </div>
  
  <div class="admin-controls">
    <h3 style="margin-bottom:1rem; font-family:'Cinzel'; color:var(--gold);">เพิ่มเมนูใหม่</h3>
    <div class="admin-form">
      <input type="text" id="mName" class="admin-input" placeholder="ชื่อเมนู">
      <input type="text" id="mPrice" class="admin-input" placeholder="ราคา หรือ คำโปรย">
      <select id="mType" class="admin-select">
        <option value="coffee">หมวดกาแฟ</option>
        <option value="noncoffee">หมวดไม่ใช่กาแฟ</option>
      </select>
    </div>
    <div class="admin-form">
      <input type="text" id="mImg" class="admin-input" placeholder="URL รูปภาพ (Direct Link)">
      <button class="btn-save" onclick="addMenu()">+ เพิ่มเมนู</button>
    </div>
  </div>

  <div id="adminMenuList"></div>
</div>

<div class="modal" id="loginModal">
  <div class="modal-content">
    <button class="close-modal" onclick="closeLoginModal()">×</button>
    <h2 class="modal-title">Admin Access</h2>
    <input type="password" id="adminPass" class="admin-input" style="width:100%; margin-bottom:1rem; text-align:center;" placeholder="รหัสผ่าน">
    <button class="btn-save" style="width:100%" onclick="submitLogin()">Verify</button>
  </div>
</div>

<a href="#" id="scrollTop" onclick="scrollToMenu();return false;">↑</a>

<script>
/* ── CONFIGURATION ── */
// วาง URL ของ Google Apps Script ที่ Deploy ไว้ที่นี่
const DRIVE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz8IdEJ8ePCv7xJrnQe78vk4rGh1IBl2auFqJZ4bWjQ9RBdFSey2tga2YEURyG-jtU/exec"; 

let menus = [];
let collect = [];
let adminUnlocked = false;

/* ── DATA CORE (Modified for Google Drive) ── */

async function saveData() {
  const allData = {
    menus: menus,
    collect: collect,
    lastUpdate: new Date().getTime()
  };

  try {
    // บันทึกลง Google Drive ผ่าน Apps Script
    await fetch(DRIVE_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(allData)
    });
    
    // สำรองข้อมูลลง LocalStorage ไว้เผื่อฉุกเฉิน
    localStorage.setItem('bt_v2_backup', JSON.stringify(allData));
    console.log("บันทึกข้อมูลลง Google Drive สำเร็จ");
  } catch (error) {
    console.error("การบันทึกข้อมูลผิดพลาด:", error);
  }
}

async function loadData() {
  try {
    console.log("กำลังโหลดข้อมูลจาก Google Drive...");
    const response = await fetch(DRIVE_SCRIPT_URL);
    const data = await response.json();

    if (data && data.menus) {
      menus = data.menus;
      collect = data.collect || [];
    } else {
      resetMenus(); 
    }
  } catch (error) {
    console.warn("ไม่สามารถติดต่อ Google Drive ได้ กำลังใช้ข้อมูลสำรองในเครื่อง...");
    const local = localStorage.getItem('bt_v2_backup');
    if (local) {
      const d = JSON.parse(local);
      menus = d.menus;
      collect = d.collect;
    } else {
        resetMenus();
    }
  }
  renderAll();
}

function resetMenus() {
  menus = [
    {id:1, name:'Espresso Gold', price:'$120', type:'coffee', img:'https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?auto=format&fit=crop&q=80&w=800'},
    {id:2, name:'Matcha Forest', price:'$135', type:'noncoffee', img:'https://images.unsplash.com/photo-1536256263959-770b48d82b0a?auto=format&fit=crop&q=80&w=800'}
  ];
  collect = [
    {id:1, name:'First Trade', icon:'📈', unlocked:true},
    {id:2, name:'Coffee Lover', icon:'☕', unlocked:false}
  ];
  saveData();
}

/* ── UI RENDERING ── */
function renderMenus() {
  const cGrid = document.getElementById('coffeeGrid');
  const ncGrid = document.getElementById('nonCoffeeGrid');
  cGrid.innerHTML = ''; ncGrid.innerHTML = '';

  menus.forEach(m => {
    const html = `
      <div class="menu-card">
        <div class="menu-img-wrap">
          <img src="${m.img}" class="menu-img" alt="${m.name}" onerror="this.src='https://via.placeholder.com/400x400?text=Barista+Trader'">
        </div>
        <div class="menu-info">
          <h3 class="menu-name">${m.name}</h3>
          <p class="menu-price">${m.price}</p>
        </div>
      </div>
    `;
    if (m.type === 'coffee') cGrid.innerHTML += html;
    else ncGrid.innerHTML += html;
  });
}

function renderCollect() {
  const grid = document.getElementById('collectGrid');
  grid.innerHTML = '';
  collect.forEach(c => {
    grid.innerHTML += `
      <div class="ach-card ${c.unlocked?'unlocked':''}">
        <span class="ach-icon">${c.icon}</span>
        <p class="ach-name">${c.name}</p>
      </div>
    `;
  });
}

function renderAdminMenus() {
  const list = document.getElementById('adminMenuList');
  list.innerHTML = `<h3 style="margin-bottom:1rem; font-family:'Cinzel'; color:var(--gold);">รายการเมนูทั้งหมด</h3>`;
  menus.forEach((m, idx) => {
    list.innerHTML += `
      <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:1rem; margin-bottom:0.5rem; border-radius:4px;">
        <span>[${m.type.toUpperCase()}] ${m.name}</span>
        <button onclick="deleteMenu(${idx})" style="background:#e74c3c; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:3px;">ลบ</button>
      </div>
    `;
  });
}

/* ── ACTIONS ── */
function addMenu() {
  const n = document.getElementById('mName').value;
  const p = document.getElementById('mPrice').value;
  const t = document.getElementById('mType').value;
  const i = document.getElementById('mImg').value;

  if(!n || !p) return alert('กรุณากรอกข้อมูลให้ครบ');

  menus.push({
    id: Date.now(),
    name: n,
    price: p,
    type: t,
    img: i || 'https://via.placeholder.com/400x400?text=No+Image'
  });

  saveData();
  renderAll();
  
  // Clear input
  document.getElementById('mName').value = '';
  document.getElementById('mPrice').value = '';
  document.getElementById('mImg').value = '';
}

function deleteMenu(idx) {
  if(confirm('ยืนยันการลบเมนูนี้?')) {
    menus.splice(idx, 1);
    saveData();
    renderAll();
  }
}

/* ── TABS & NAVIGATION ── */
function switchTab(id, btn) {
  if (id === 'admin' && !adminUnlocked) {
    openLoginModal();
    return;
  }
  
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
  scrollToMenu();
}

function scrollToMenu() {
  document.getElementById('mainNav').scrollIntoView({ behavior: 'smooth' });
}

function openLoginModal() {
  document.getElementById('loginModal').classList.add('open');
}

function closeLoginModal() {
  document.getElementById('loginModal').classList.remove('open');
}

function submitLogin() {
  const pass = document.getElementById('adminPass').value;
  if(pass === '1234') { // รหัสผ่านเดิมของคุณ
    adminUnlocked = true;
    closeLoginModal();
    const adminBtn = document.querySelector('.admin-tab');
    switchTab('admin', adminBtn);
  } else {
    alert('รหัสผ่านไม่ถูกต้อง');
  }
}

function renderAll(){
  renderMenus();
  renderCollect();
  renderAdminMenus();
}

window.onscroll = function() {
  const btn = document.getElementById('scrollTop');
  if (window.scrollY > 400) btn.classList.add('visible');
  else btn.classList.remove('visible');
};

/* ── START ── */
window.onload = loadData;

</script>
</body>
</html>
