  </div>
</div>

<script>
/* ── CONFIGURATION ── */
// วาง URL ของ Google Apps Script ที่คุณ Deploy ไว้ที่นี่
const DRIVE_SCRIPT_URL = "ระบุ_URL_ของ_APPS_SCRIPT_ที่นี่"; 

let menus = [];
let collect = [];
let adminUnlocked = false;

/* ── DATA CORE (Modified for Google Drive) ── */

// ฟังก์ชันบันทึกข้อมูลไปยัง Google Drive
async function saveData() {
  const allData = {
    menus: menus,
    collect: collect,
    lastUpdate: new Date().getTime()
  };

  try {
    // บันทึกลง Google Drive ผ่าน Apps Script
    await fetch(DRIVE_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(allData)
    });
    
    // สำรองข้อมูลลง LocalStorage ไว้เผื่อฉุกเฉิน
    localStorage.setItem('bt_v2_backup', JSON.stringify(allData));
    updateMeter(); 
    console.log("บันทึกข้อมูลลง Google Drive สำเร็จ");
  } catch (error) {
    console.error("การบันทึกข้อมูลผิดพลาด:", error);
  }
}

// ฟังก์ชันโหลดข้อมูลจาก Google Drive
async function loadData() {
  try {
    console.log("กำลังโหลดข้อมูลจาก Google Drive...");
    const response = await fetch(DRIVE_SCRIPT_URL);
    const data = await response.json();

    if (data && data.menus) {
      menus = data.menus;
      collect = data.collect || [];
    } else {
      // หากใน Drive ยังไม่มีข้อมูล ให้ใช้ค่าตั้งต้น
      resetMenus(); 
    }
  } catch (error) {
    console.warn("ไม่สามารถติดต่อ Google Drive ได้ กำลังใช้ข้อมูลสำรองในเครื่อง...");
    const local = localStorage.getItem('bt_v2_backup');
    if (local) {
      const d = JSON.parse(local);
      menus = d.menus;
      collect = d.collect;
    }
  }
  renderAll();
}

/* ── ฟังก์ชันเดิมคงอยู่ครบถ้วน ── */
function renderAll() {
  renderMenus();
  renderCollect();
  renderAdminMenus();
  renderAdminCollect();
}

// ... (ฟังก์ชันจัดการ UI อื่นๆ เช่น switchTab, openLoginModal, addMenu, deleteMenu ฯลฯ ผมคงไว้ตามเดิมทั้งหมด) ...

/* ── INIT ── */
window.onload = loadData; // เริ่มต้นทำงานด้วยการโหลดจาก Drive

</script>
</body>
