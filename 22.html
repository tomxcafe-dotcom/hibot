<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIBOT - Expert Advisor MT4/MT5</title>
    <style>
        /* ======= 🛡️ PROTECTION LAYER (ปรับปรุง) ======= */
        *,*::before,*::after{-webkit-user-select:none!important;-moz-user-select:none!important;-ms-user-select:none!important;user-select:none!important;-webkit-touch-callout:none!important;}
        img,a,p,h1,h2,h3,h4,h5,h6,span,div,li,ul{-webkit-user-drag:none!important;user-drag:none!important;}
        
        /* Watermark Background */
        body::after{content:'HIBOT © hibot.in.th';position:fixed;top:0;left:0;right:0;bottom:0;z-index:9990;pointer-events:none;font-size:14px;font-weight:700;color:rgba(6,182,212,.03);transform:rotate(-28deg) scale(1.5);white-space:pre-wrap;overflow:hidden;font-family:monospace;}

        /* Warning Overlay */
        #__dt_warn{display:none;position:fixed;inset:0;background:rgba(15,23,42,.98);z-index:100000;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px;backdrop-filter:blur(20px);}
        #__dt_warn.show{display:flex;}
        #__dt_warn .dw-icon{font-size:80px;margin-bottom:20px;animation:dw-pulse 1.4s infinite;}
        @keyframes dw-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
        #__dt_warn h2{font-size:30px;font-weight:900;color:#ef4444;margin-bottom:14px;font-family:sans-serif;}
        #__dt_warn p{color:#94a3b8;font-size:16px;line-height:1.6;max-width:400px;}
        #__dt_warn button{margin-top:30px;padding:12px 36px;background:linear-gradient(135deg,#ef4444,#f59e0b);color:#fff;border:none;border-radius:50px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(239,68,68,0.4);}

        /* ======= MAIN UI STYLES ======= */
        :root{
            --pg:linear-gradient(135deg,#06b6d4 0%,#10b981 100%);
            --bg:#f0fdfa;--card:rgba(255,255,255,0.9);
            --t1:#0f172a;--t2:#475569;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--t1);line-height:1.6;overflow-x:hidden;}
        .header{position:fixed;top:0;width:100%;padding:15px 0;background:rgba(255,255,255,0.8);backdrop-filter:blur(15px);border-bottom:1px solid rgba(6,182,212,0.1);z-index:1000;}
        .container{max-width:1200px;margin:0 auto;padding:0 20px;}
        .nav{display:flex;justify-content:space-between;align-items:center;}
        .logo{display:flex;align-items:center;gap:12px;}
        .logo img{width:45px;height:45px;border-radius:10px;}
        .logo-text{font-size:18px;font-weight:800;background:var(--pg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

        .page-section{display:none;padding:120px 0 60px;min-height:100vh;}
        .page-section.active{display:block;}

        .hero{text-align:center;padding:60px 20px;}
        .hero h1{font-size:clamp(28px,5vw,60px);margin-bottom:20px;background:var(--pg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        
        .product-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:40px;}
        .product-card{background:var(--card);padding:30px;border-radius:20px;border:1px solid rgba(6,182,212,0.1);text-align:center;transition:0.3s;}
        .product-card:hover{transform:translateY(-10px);box-shadow:0 15px 30px rgba(6,182,212,0.15);}
        .price{font-size:36px;font-weight:900;margin:15px 0;color:#06b6d4;}
        
        .btn{display:inline-block;padding:12px 30px;background:var(--pg);color:#fff;text-decoration:none;border-radius:50px;font-weight:700;cursor:pointer;border:none;width:100%;}
        
        #save-indicator{position:fixed;bottom:20px;right:20px;padding:10px 20px;background:#10b981;color:#fff;border-radius:50px;font-size:12px;opacity:0;transition:0.3s;z-index:9999;}
        
        footer{padding:40px;text-align:center;background:#fff;font-size:14px;color:var(--t2);}
        .admin-btn{margin-top:20px;background:none;border:1px solid #ddd;padding:5px 15px;border-radius:20px;cursor:pointer;font-size:11px;}
    </style>
</head>
<body>

<div id="__dt_warn">
    <div class="dw-icon">🚨</div>
    <h2>⛔ หยุด! Stop!</h2>
    <p>ตรวจพบการพยายามเข้าถึงซอร์สโค้ด<br>เนื้อหาทั้งหมดเป็นทรัพย์สินของ HIBOT<br>หากเป็นความผิดพลาด กรุณากดปุ่มด้านล่าง</p>
    <button onclick="document.getElementById('__dt_warn').classList.remove('show')">รับทราบ / OK</button>
</div>

<header class="header">
    <div class="container">
        <nav class="nav">
            <div class="logo">
                <img src="https://hibot.in.th/Doc/HBLOGO2.png" alt="Logo">
                <span class="logo-text">HIBOT Expert Advisor</span>
            </div>
            <div>
                <button onclick="showPage('home')" style="background:none;border:none;cursor:pointer;font-weight:700;">🏠 หน้าแรก</button>
            </div>
        </nav>
    </div>
</header>

<div id="page-home" class="page-section active">
    <div class="container">
        <section class="hero">
            <h1>เทรดอัตโนมัติ 24 ชั่วโมง</h1>
            <p>เลือกแพ็คเกจ HIBOT EA ที่เหมาะกับคุณ</p>
            <div class="product-grid" id="pkg-list">
                </div>
        </section>
    </div>
</div>

<footer>
    <p>© 2024 HIBOT Expert Advisor. All rights reserved.</p>
    <button class="admin-btn" onclick="location.href='#admin'">Admin Panel</button>
</footer>

<div id="save-indicator">บันทึกข้อมูลเรียบร้อย</div>

<script>
    // ข้อมูลเริ่มต้น (Backup)
    let DB = {
        packages: [
            {id:1, name:'EURUSD Basic', price:999, features:['เทรดคู่เงิน EURUSD','MT4 เท่านั้น','อัปเดตฟรีตลอดชีพ']},
            {id:2, name:'Full Package', price:2900, features:['เทรดได้ทุกคู่เงิน','รองรับ MT4/MT5','มีซัพพอร์ตดูแล']}
        ]
    };

    function renderHome() {
        const list = document.getElementById('pkg-list');
        list.innerHTML = DB.packages.map(p => `
            <div class="product-card">
                <h3>${p.name}</h3>
                <div class="price">฿${p.price.toLocaleString()}</div>
                <ul style="list-style:none;margin-bottom:20px;font-size:14px;color:#666;">
                    ${p.features.map(f => `<li>✅ ${f}</li>`).join('')}
                </ul>
                <button class="btn" onclick="alert('กรุณาติดต่อผ่าน Line เพื่อสั่งซื้อ')">สั่งซื้อตอนนี้</button>
            </div>
        `).join('');
    }

    function showPage(id) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
    }

    // ======= 🛡️ PROTECTION SCRIPT (ปรับปรุงใหม่เพื่อ iPad) =======
    (function(){
        // ป้องกันคลิกขวา
        document.addEventListener('contextmenu', e => e.preventDefault());

        // ป้องกันปุ่มคัดลอก
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'u' || e.key === 's' || e.key === 'c' || e.key === 'i')) {
                e.preventDefault();
            }
            if (e.key === 'F12') e.preventDefault();
        });

        // ฟังก์ชันตรวจจับ DevTools แบบแม่นยำขึ้น
        function detectDevTools() {
            const threshold = 160;
            // เช็คความต่างกว้าง/ยาว (ขยายให้กว้างขึ้นเพื่อเลี่ยง Error บน iPad)
            const widthDiff = window.outerWidth - window.innerWidth > threshold;
            const heightDiff = window.outerHeight - window.innerHeight > threshold;

            // ตรวจจับผ่าน Console (วิธีนี้แม่นยำและไม่กวนหน้าจอ iPad ทั่วไป)
            let devtoolsOpen = false;
            const devtools = /./;
            devtools.toString = function() {
                devtoolsOpen = true;
                return '';
            };
            console.log('%c', devtools);

            // ถ้าเปิด DevTools จริง หรือขนาดจอมือถือ/แท็บเล็ตไม่ใช่แนวตั้งปกติที่กว้างเกินเหตุ
            if (devtoolsOpen || (widthDiff && heightDiff)) {
                // จะไม่สั่งโชว์ทันทีบนอุปกรณ์พกพา เว้นแต่จะเจอหลักฐานชัดเจน
                if (!('ontouchstart' in window)) { 
                    document.getElementById('__dt_warn').classList.add('show');
                }
            }
        }

        // ตรวจสอบทุกๆ 2 วินาที
        setInterval(detectDevTools, 2000);
    })();

    window.onload = renderHome;
</script>

</body>
</html>
