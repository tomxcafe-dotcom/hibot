<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barista Trader Journal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8f9fa; color: #333; }
        .header-section { background: linear-gradient(135deg, #6f4e37, #2c1b0e); color: white; padding: 20px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { border-radius: 15px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .table-responsive { border-radius: 10px; overflow: hidden; }
        .btn-coffee { background-color: #6f4e37; color: white; }
        .btn-coffee:hover { background-color: #5a3d2b; color: white; }
        .profit { color: #28a745; font-weight: bold; }
        .loss { color: #dc3545; font-weight: bold; }
        .summary-box { text-align: center; padding: 10px; border-right: 1px solid #eee; }
        .summary-box:last-child { border-right: none; }
    </style>
</head>
<body>

<div class="header-section text-center">
    <h2 class="mb-0">☕ Barista Trader Journal</h2>
    <p class="small opacity-75">บันทึกวินัย เปลี่ยนกราฟเป็นกำไร</p>
</div>

<div class="container mt-3">
    <div class="card p-3">
        <div class="row">
            <div class="col-4 summary-box">
                <small class="text-muted">Total Profit</small>
                <div id="totalProfit" class="h5 mb-0">0</div>
            </div>
            <div class="col-4 summary-box">
                <small class="text-muted">Win Rate</small>
                <div id="winRate" class="h5 mb-0">0%</div>
            </div>
            <div class="col-4 summary-box">
                <small class="text-muted">Total Trades</small>
                <div id="totalTrades" class="h5 mb-0">0</div>
            </div>
        </div>
    </div>

    <div class="card p-3">
        <h6>บันทึกการเทรดวันนี้</h6>
        <div class="row g-2">
            <div class="col-6"><input type="date" id="date" class="form-control"></div>
            <div class="col-6"><input type="number" id="startBal" placeholder="ทุนเริ่ม" class="form-control"></div>
            <div class="col-6"><input type="number" id="endBal" placeholder="ทุนจบ" class="form-control"></div>
            <div class="col-3"><input type="number" id="win" placeholder="ชนะ" class="form-control"></div>
            <div class="col-3"><input type="number" id="loss" placeholder="แพ้" class="form-control"></div>
            <div class="col-12"><input type="text" id="system" placeholder="ระบบ/แนวคิด (เช่น PA, EMA)" class="form-control"></div>
            <div class="col-12"><textarea id="note" placeholder="อารมณ์ / ข้อสังเกต" class="form-control" rows="2"></textarea></div>
            <div class="col-12"><input type="text" id="fix" placeholder="สิ่งที่ต้องปรับปรุง" class="form-control"></div>
            <button onclick="saveTrade()" class="btn btn-coffee w-100 mt-2">บันทึกข้อมูล</button>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-hover bg-white">
            <thead class="table-dark">
                <tr style="font-size: 0.8rem;">
                    <th>วันที่</th>
                    <th>กำไร/ขาดทุน</th>
                    <th>ชนะ/แพ้</th>
                    <th>ระบบ/อารมณ์</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody id="tradeLogs" style="font-size: 0.85rem;">
                </tbody>
        </table>
    </div>
    
    <button onclick="clearData()" class="btn btn-outline-danger btn-sm w-100 mb-5">ล้างข้อมูลทั้งหมด</button>
</div>

<script>
    let trades = JSON.parse(localStorage.getItem('forex_trades')) || [];

    function saveTrade() {
        const trade = {
            id: Date.now(),
            date: document.getElementById('date').value,
            startBal: parseFloat(document.getElementById('startBal').value),
            endBal: parseFloat(document.getElementById('endBal').value),
            win: parseInt(document.getElementById('win').value),
            loss: parseInt(document.getElementById('loss').value),
            system: document.getElementById('system').value,
            note: document.getElementById('note').value,
            fix: document.getElementById('fix').value
        };

        if(!trade.date || isNaN(trade.startBal)) return alert("กรุณากรอกข้อมูลให้ครบ");

        trades.unshift(trade);
        localStorage.setItem('forex_trades', JSON.stringify(trades));
        renderTrades();
        resetForm();
    }

    function renderTrades() {
        const logTable = document.getElementById('tradeLogs');
        logTable.innerHTML = '';
        let totalP = 0, totalW = 0, totalL = 0;

        trades.forEach(t => {
            const profit = t.endBal - t.startBal;
            totalP += profit;
            totalW += t.win;
            totalL += t.loss;

            logTable.innerHTML += `
                <tr>
                    <td>${t.date.split('-')[2]}/${t.date.split('-')[1]}</td>
                    <td class="${profit >= 0 ? 'profit' : 'loss'}">${profit.toLocaleString()}</td>
                    <td>${t.win}/${t.loss}</td>
                    <td><small><b>${t.system}</b><br>${t.note}</small></td>
                    <td><button onclick="deleteTrade(${t.id})" class="btn btn-sm text-danger">X</button></td>
                </tr>
            `;
        });

        document.getElementById('totalProfit').innerHTML = totalP.toLocaleString();
        document.getElementById('totalProfit').className = totalP >= 0 ? 'h5 mb-0 profit' : 'h5 mb-0 loss';
        document.getElementById('totalTrades').innerHTML = totalW + totalL;
        const wr = (totalW + totalL) > 0 ? ((totalW / (totalW + totalL)) * 100).toFixed(1) : 0;
        document.getElementById('winRate').innerHTML = wr + '%';
    }

    function deleteTrade(id) {
        trades = trades.filter(t => t.id !== id);
        localStorage.setItem('forex_trades', JSON.stringify(trades));
        renderTrades();
    }

    function resetForm() {
        document.getElementById('startBal').value = document.getElementById('endBal').value;
        document.getElementById('win').value = '';
        document.getElementById('loss').value = '';
        document.getElementById('note').value = '';
    }

    function clearData() {
        if(confirm("ยืนยันการลบข้อมูลทั้งหมด?")) {
            localStorage.removeItem('forex_trades');
            location.reload();
        }
    }

    window.onload = renderTrades;
</script>
</body>
</html>
