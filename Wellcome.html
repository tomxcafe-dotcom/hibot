<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIBOT | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #9d50bb;
            --bg-dark: #0f0c29;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Kanit', sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* พื้นหลังแบบเคลื่อนไหว */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #6e48aa);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card */
        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 90%;
            animation: fadeInUp 1.2s ease-out;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            letter-spacing: 10px;
            margin-bottom: 0;
            background: linear-gradient(to right, #00d2ff, #9d50bb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.5));
        }

        h2 {
            font-weight: 300;
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-top: 0.5rem;
            opacity: 0.8;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(0, 210, 255, 0.2);
            border: 1px solid var(--primary-color);
            border-radius: 50px;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        /* Countdown Style */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 2rem 0;
        }

        .time-box {
            font-size: 1.2rem;
        }

        .time-box span {
            display: block;
            font-size: 2.5rem;
            font-weight: 600;
        }

        .input-group {
            margin-top: 2.5rem;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        input[type="email"] {
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            width: 60%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        button {
            padding: 12px 25px;
            border-radius: 50px;
            border: none;
            background: var(--primary-color);
            color: #0f0c29;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--primary-color);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="container">
        <div class="status-badge">System Initializing...</div>
        <h1 class="logo-text">HIBOT</h1>
        <h2>เตรียมพบกับความอัจฉริยะเร็วๆ นี้</h2>
        
        <div class="countdown" id="timer">
            <div class="time-box"><span id="days">00</span>วัน</div>
            <div class="time-box"><span id="hours">00</span>ชม.</div>
            <div class="time-box"><span id="minutes">00</span>นาที</div>
        </div>

        <p>ลงทะเบียนรับแจ้งเตือนเมื่อเราเปิดใช้งาน</p>
        <div class="input-group">
            <input type="email" placeholder="กรอกอีเมลของคุณ...">
            <button>แจ้งเตือนฉัน</button>
        </div>
    </div>

    <script>
        // ตั้งเวลาเป้าหมาย (ตัวอย่าง: อีก 15 วันข้างหน้า)
        const countDownDate = new Date().getTime() + (15 * 24 * 60 * 60 * 1000);

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById("days").innerHTML = days;
            document.getElementById("hours").innerHTML = hours;
            document.getElementById("minutes").innerHTML = minutes;

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("timer").innerHTML = "OPEN NOW";
            }
        }, 1000);
    </script>
</body>
</html>
