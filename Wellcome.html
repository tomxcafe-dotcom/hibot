<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIBOT | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #9d50bb;
            --bg-dark: #0f0c29;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Kanit', sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* พื้นหลังแบบเคลื่อนไหว */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #6e48aa);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card */
        .container {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            max-width: 650px;
            width: 90%;
            animation: fadeInUp 1.2s ease-out;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 18px;
            background: rgba(0, 210, 255, 0.15);
            border: 1px solid var(--primary-color);
            border-radius: 50px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 5rem);
            letter-spacing: 12px;
            margin: 0;
            background: linear-gradient(to right, #00d2ff, #9d50bb, #00d2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        h2 {
            font-weight: 300;
            font-size: 1.4rem;
            letter-spacing: 1px;
            margin-top: 10px;
            opacity: 0.9;
            color: #e0e0e0;
        }

        /* Countdown Style */
        .countdown {
            display: flex;
            justify-content: center;
            gap: clamp(10px, 4vw, 30px);
            margin: 3rem 0 1rem 0;
        }

        .time-box {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.6);
        }

        .time-box span {
            display: block;
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 600;
            color: white;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 210, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="container">
        <div class="status-badge">System Initializing...</div>
        <h1 class="logo-text">HIBOT</h1>
        <h2>COMING SOON</h2>
        
        <div class="countdown" id="timer">
            <div class="time-box"><span id="days">14</span>Days</div>
            <div class="time-box"><span id="hours">00</span>Hours</div>
            <div class="time-box"><span id="minutes">00</span>Mins</div>
            <div class="time-box"><span id="seconds">00</span>Secs</div>
        </div>

        <p style="margin-top: 2rem; font-weight: 300; opacity: 0.7;">เตรียมพบกับนิยามใหม่ของ AI เร็วๆ นี้</p>
    </div>

    <script>
        // กำหนดเวลาเป้าหมาย: นับจากตอนนี้ไปอีก 14 วัน
        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + 14);
        const countDownDate = targetDate.getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            // คำนวณ วัน, ชม., นาที, วินาที
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // แสดงผล (ใส่เลข 0 ข้างหน้าถ้าหลักเดียว)
            document.getElementById("days").innerHTML = days;
            document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;

            // ถ้าหมดเวลา
            if (distance < 0) {
                clearInterval(x);
                document.getElementById("timer").innerHTML = "<h2 style='color:#00d2ff'>WE ARE LIVE!</h2>";
            }
        }, 1000);
    </script>
</body>
</html>
